<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardread Pro</title>
    <link rel="stylesheet" href="common.css">
    <script src="utils.js" defer></script>
    <script src="common.js" defer></script>
</head>
<body>
    <div class="app" id="appRoot">
        <div class="drag-overlay" id="dragOverlay">
            <div class="drag-overlay-box">
                <div class="drag-overlay-icon">📥</div>
                <div class="drag-overlay-text">拖放文件到此处导入</div>
                <div class="drag-overlay-hint">支持 TXT / MD / EPUB / MOBI 格式</div>
            </div>
        </div>

        <div class="title-bar" id="titleBar">
            <span class="title-brand"><span class="brand-name">Cardread</span><span class="brand-pro">Pro</span></span>
            <span class="spacer"></span>
            <button class="win-btn" onclick="minimizeWindow()" title="最小化">─</button>
            <button class="win-btn" id="maxBtn" onclick="toggleMaximize()" title="最大化">□</button>
            <button class="win-btn close-btn" onclick="closeWindow()" title="关闭">✕</button>
        </div>

        <div class="nav-bar">
            <div class="nav-links">
                <a class="active" data-page="shelf" onclick="navTo('shelf')">书架</a>
                <a data-page="bookmark" onclick="navTo('bookmark')">书签</a>
                <a data-page="notes" onclick="navTo('notes')">便签</a>
                <a data-page="stats" onclick="navTo('stats')">统计</a>
                <a data-page="settings" onclick="navTo('settings')">设置</a>
                <a data-page="guide" onclick="navTo('guide')">说明</a>
                <a data-page="log" onclick="navTo('log')">日志</a>
            </div>
        </div>

        <div class="main-body">
            <div class="content">
                <div class="page-panel active" id="pageShelf">
                    <div class="hero-section" id="heroSection" onclick="heroClick()">
                        <div class="hero-empty" id="heroEmpty">
                            <div class="hero-empty-title">开启阅读之旅</div>
                            <div class="hero-empty-sub">添加书籍开始阅读 ✨</div>
                        </div>
                        <div id="heroContent" style="display:none;width:100%;align-items:center;gap:20px;">
                            <div class="hero-cover" id="heroCover">📖</div>
                            <div class="hero-info">
                                <div class="hero-label">继续阅读</div>
                                <div class="hero-title" id="heroTitle"></div>
                                <div class="hero-ch" id="heroCh"></div>
                                <button class="hero-btn" id="heroBtn" onclick="event.stopPropagation();openBook(this.dataset.book)">▶ 继续</button>
                            </div>
                        </div>
                    </div>

                    <div class="list-section">
                        <div class="list-header">
                            <span class="list-title">我的书架</span>
                            <span class="count-badge" id="bookCountBadge">0 本</span>
                            <div style="position:relative;display:flex;align-items:center;flex:1;min-width:0;">
                                <input class="search-box" id="searchInput" type="text" placeholder="搜索书籍..." oninput="filterBooks()" style="padding-right:22px;">
                                <button id="searchClear" class="search-clear-btn" onclick="document.getElementById('searchInput').value='';filterBooks();" title="清除搜索">✕</button>
                            </div>
                            <select class="filter-select" id="filterFormat" onchange="filterBooks()">
                                <option value="">全部格式</option>
                                <option value="TXT">TXT</option>
                                <option value="MD">MD</option>
                                <option value="EPUB">EPUB</option>
                                    <option value="MOBI">MOBI</option>
                            </select>
                            <select class="filter-select" id="filterProgress" onchange="filterBooks()">
                                <option value="">全部进度</option>
                                <option value="unread">未读</option>
                                <option value="reading">阅读中</option>
                                <option value="done">已读</option>
                            </select>
                            <select class="filter-select" id="sortBy" onchange="filterBooks()">
                                <option value="recent">最近阅读</option>
                                <option value="name">书名字母序</option>
                                <option value="added">添加时间</option>
                                <option value="progress">进度</option>
                            </select>
                            <button class="add-btn" onclick="addBooks()" title="添加书籍">+</button>
                        </div>
                        <div class="book-list" id="bookList">
                            <div class="empty-state"><div class="icon">📚</div><p>书架为空，请添加书籍</p></div>
                        </div>
                    </div>
                </div>

                <div class="page-panel" id="pageSettings"></div>

                <div class="page-panel" id="pageBookmark">
                    <div class="bookmark-list" id="bookmarkList">
                        <div class="empty-state"><div class="icon">🔖</div><p>暂无书签</p></div>
                    </div>
                </div>

                <div class="page-panel" id="pageNotes"></div>

                <div class="page-panel" id="pageStats">
                    <div class="stats-page" id="statsPage">
                        <div class="empty-state"><div class="icon">📊</div><p>暂无统计数据</p></div>
                    </div>
                </div>

                <div class="page-panel" id="pageGuide"></div>
                <div class="page-panel" id="pageLog"></div>
            </div>

            <div class="sidebar" id="sidebar">
                <div class="stat-card">
                    <div class="stat-val" id="booksCount">0</div>
                    <div class="stat-label">总藏书</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="chaptersCount">0</div>
                    <div class="stat-label">章节</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="readingTime">0</div>
                    <div class="stat-label" id="readingTimeUnit">阅读时长</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="progressPercent">0%</div>
                    <div class="stat-label">阅读进度</div>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <span id="statusText">就绪</span>
            <span class="spacer"></span>
            <span style="margin-left:10px;" id="versionText">v0.0.1</span>
        </div>
    </div>

    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <h2 id="confirmTitle">确认</h2>
            <p id="confirmMessage"></p>
            <div class="modal-actions"><button class="btn btn-ghost" onclick="closeConfirm()">取消</button><button class="btn btn-accent" onclick="confirmAction()">确定</button></div>
        </div>
    </div>

    <div class="modal-overlay" id="promptModal">
        <div class="modal">
            <h2 id="promptTitle">输入</h2>
            <label class="modal-input-label" id="promptLabel"></label>
            <input class="modal-input" id="promptInput" type="text" onkeydown="if(event.key==='Enter'){event.preventDefault();promptConfirmAction();}if(event.key==='Escape'){closePrompt();}">
            <div class="modal-actions" style="margin-top:14px;"><button class="btn btn-ghost" onclick="closePrompt()">取消</button><button class="btn btn-accent" onclick="promptConfirmAction()">确定</button></div>
        </div>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="modal" style="max-width:380px;">
            <h2 id="detailTitle">书籍详情</h2>
            <div id="detailBody" style="font-size:12px;color:var(--fg);line-height:2.2;"></div>
            <div class="modal-actions" style="margin-top:14px;"><button class="btn btn-accent" onclick="closeDetailModal()">关闭</button></div>
        </div>
    </div>

    <div class="context-menu" id="contextMenu">
            <div class="context-menu-item" onclick="openBookFromContext()">📖 打开阅读</div>
            <div class="context-menu-item" onclick="openBookDirFromContext()">📂 打开目录</div>
            <div class="context-menu-divider"></div>
            <div class="context-menu-item" onclick="copyBookName()">📋 复制书名</div>
            <div class="context-menu-item" onclick="copyBookPath()">📁 复制文件路径</div>
            <div class="context-menu-item" onclick="renameBookFromContext()">✏️ 重命名</div>
            <div class="context-menu-item" onclick="showBookDetailFromContext()">📄 查看详情</div>
            <div class="context-menu-divider"></div>
            <div class="context-menu-item" onclick="deleteBookFromContext()" style="color:var(--danger);">🗑️ 删除书籍</div>
            <div class="context-menu-divider"></div>
            <div class="context-menu-item" onclick="clearBookshelfFromContext()" style="color:var(--danger);font-weight:600;">⚠️ 清空书架</div>
        </div>

    <div class="toast" id="toast"></div>

    <script>
        async function init() {
            try {
                await Promise.all([loadAppInfo(), loadSettings()]);
                await loadTheme();
                await loadDashboard();
            } catch (e) {
                console.error('[Init] 初始化失败:', e.message || e);
            }
            setupDragDrop();
        }
        window.addEventListener('pywebviewready', init);
    </script>
</body>
</html>
