<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>便签编辑器</title>
    <script src="utils.js" defer></script>
    <link rel="stylesheet" href="notes_editor.css">
</head>
<body>
    <div class="editor-card">
        <div class="title-bar" id="titleBar">
            <span class="editor-title" id="editorTitle">便签</span>
            <span style="flex:1"></span>
            <button class="win-btn close-btn" id="closeBtn" title="关闭">✕</button>
        </div>
        <div class="toolbar" id="toolbar">
            <button class="tb-btn" data-action="bold" title="粗体"><strong>B</strong></button>
            <button class="tb-btn" data-action="italic" title="斜体"><em>I</em></button>
            <span class="tb-sep"></span>
            <button class="tb-btn" data-action="h1" title="一级标题">H1</button>
            <button class="tb-btn" data-action="h2" title="二级标题">H2</button>
            <span class="tb-sep"></span>
            <button class="tb-btn" data-action="ul" title="无序列表">•</button>
            <button class="tb-btn" data-action="ol" title="有序列表">1.</button>
            <button class="tb-btn" data-action="task" title="待办">✓</button>
            <span class="tb-sep"></span>
            <button class="tb-btn" data-action="code" title="代码块">&lt;/&gt;</button>
            <button class="tb-btn" data-action="link" title="链接">🔗</button>
        </div>
        <div class="editor-body" id="editorBody">
            <div class="pane editor-pane" id="editorPane">
                <textarea id="editor" spellcheck="false" placeholder="输入 Markdown 内容..."></textarea>
            </div>
            <div class="divider" id="divider"></div>
            <div class="pane preview-pane" id="previewPane">
                <div class="preview-content" id="preview"></div>
            </div>
        </div>
        <div class="bottom-bar" id="bottomBar">
            <span class="char-count" id="charCount">0 字</span>
            <span style="flex:1"></span>
            <span class="save-time" id="saveTime"></span>
        </div>
        <div class="resize-handle" id="resizeHandle"></div>
    </div>
    <div class="toast" id="toast"></div>
    <script src="notes_editor.js" defer></script>
</body>
</html>
